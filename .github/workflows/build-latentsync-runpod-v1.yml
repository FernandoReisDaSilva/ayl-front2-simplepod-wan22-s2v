name: Build LatentSync RunPod V1

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Target image tag."
        required: true
        default: "ghcr.io/fernandoreisdasilva/ayl-latentsync-runpod:0.1.8"
        type: string
      download_checkpoints:
        description: "Download and embed LatentSync checkpoints during build."
        required: true
        default: false
        type: boolean
      push_image:
        description: "Push the built image to GHCR."
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build LatentSync RunPod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/latentsync-runpod-v1/Dockerfile
          push: ${{ inputs.push_image }}
          tags: ${{ inputs.image_tag }}
          build-args: |
            DOWNLOAD_CHECKPOINTS=${{ inputs.download_checkpoints && '1' || '0' }}
