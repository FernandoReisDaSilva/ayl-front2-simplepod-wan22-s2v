name: Build Wan2.2 S2V RunPod V1

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Target image tag."
        required: true
        default: "0.1.0"
        type: string
      push_image:
        description: "Push the built image to GHCR."
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/fernandoreisdasilva/ayl-wan22-s2v-runpod

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Wan2.2 S2V RunPod image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/wan22-s2v-runpod-v1/Dockerfile
          push: ${{ inputs.push_image }}
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
