name: Build SimplePod Wan2.2 S2V Blackwell FP8 Wan Gate 0

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Experimental FP8 Wan Gate 0 image tag."
        required: true
        default: "0.3.08-blackwell-fp8-wan-gate0-dependencies-v1"
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/fernandoreisdasilva/ayl-simplepod-wan22-s2v-fastapi-v2

jobs:
  build:
    name: Build and publish FP8 Wan Gate 0 image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          echo "Disk before cleanup"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          docker system prune -af || true
          echo "Disk after cleanup"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate probe syntax
        run: |
          python3 -m py_compile scripts/fp8/temp_fp8_runtime_probe_v1.py
          python3 -m py_compile scripts/fp8/temp_fp8_build_smoke_v1.py
          python3 -m py_compile scripts/fp8/temp_fp8_wan_import_smoke_v1.py
          python3 -m py_compile scripts/fp8/temp_fp8_wan_gate0_probe_v1.py
          python3 scripts/fp8/temp_fp8_wan_gate0_probe_v1.py --run-mock-tests

      - name: Build FP8 Wan Gate 0 image
        run: |
          docker build \
            -f docker/simplepod-wan22-s2v-fastapi-v2-blackwell-fp8/Dockerfile \
            -t "${IMAGE_NAME}:${{ inputs.image_tag }}" \
            .

      - name: Validate TorchAO imports inside image
        run: docker run --rm --entrypoint python "${IMAGE_NAME}:${{ inputs.image_tag }}" ./temp_fp8_build_smoke_v1.py

      - name: Validate PyTorch vision/audio ABI and Wan imports inside image
        run: |
          rm -f fp8_dependency_validation.json
          docker run --rm \
            --entrypoint python \
            -v "${PWD}:/workspace" \
            "${IMAGE_NAME}:${{ inputs.image_tag }}" \
            ./temp_fp8_wan_import_smoke_v1.py \
            --report-path /workspace/fp8_dependency_validation.json
          python3 -m json.tool fp8_dependency_validation.json

      - name: Upload FP8 dependency validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fp8_dependency_validation
          path: fp8_dependency_validation.json
          if-no-files-found: warn

      - name: Validate Wan Gate 0 mock inside image
        run: docker run --rm --entrypoint python "${IMAGE_NAME}:${{ inputs.image_tag }}" ./temp_fp8_wan_gate0_probe_v1.py --mock-stage success --report-path /tmp/fp8_wan_gate0_mock.json

      - name: Push FP8 Wan Gate 0 image
        run: docker push "${IMAGE_NAME}:${{ inputs.image_tag }}"
