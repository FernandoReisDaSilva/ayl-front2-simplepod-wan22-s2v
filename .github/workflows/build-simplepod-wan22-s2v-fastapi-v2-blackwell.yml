name: Build SimplePod Wan2.2 S2V FastAPI V2 Blackwell

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Experimental Blackwell image tag."
        required: true
        default: "0.2.22-blackwell"
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/fernandoreisdasilva/ayl-simplepod-wan22-s2v-fastapi-v2

jobs:
  build:
    name: Build and publish Blackwell experimental image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free runner disk space
        run: |
          echo "Disk before cleanup"
          df -h
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache
          docker system prune -af || true
          echo "Disk after cleanup"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate FastAPI import graph
        working-directory: docker/simplepod-wan22-s2v-fastapi-v2-blackwell
        run: |
          python -m pip install --no-cache-dir -r requirements.txt
          python - <<'PY'
          import app.main
          print("app.main import OK")
          PY

      - name: Build Blackwell image
        run: |
          docker build \
            -f docker/simplepod-wan22-s2v-fastapi-v2-blackwell/Dockerfile \
            -t "${IMAGE_NAME}:${{ inputs.image_tag }}" \
            docker/simplepod-wan22-s2v-fastapi-v2-blackwell

      - name: Validate runtime optional imports inside image
        run: |
          docker run --rm "${IMAGE_NAME}:${{ inputs.image_tag }}" python - <<'PY'
          import torch, diffusers, accelerate, safetensors, transformers
          print("torch", torch.__version__)
          print("torch_cuda", getattr(torch.version, "cuda", ""))
          for m in ["flash_attn","xformers","triton","decord","librosa","soundfile","moviepy","einops","peft","dashscope"]:
              try:
                  __import__(m)
                  print(m, "OK")
              except Exception as e:
                  print(m, "FAIL", type(e).__name__, str(e)[:160])
          PY

      - name: Push Blackwell image
        run: docker push "${IMAGE_NAME}:${{ inputs.image_tag }}"
