name: Build SimplePod Wan2.2 S2V FastAPI V2

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Target image tag."
        required: true
        default: "0.1.1"
        type: string

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/fernandoreisdasilva/ayl-simplepod-wan22-s2v-fastapi-v2

jobs:
  build:
    name: Build and publish image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish SimplePod Wan2.2 S2V FastAPI V2 image
        uses: docker/build-push-action@v6
        with:
          context: docker/simplepod-wan22-s2v-fastapi-v2
          file: docker/simplepod-wan22-s2v-fastapi-v2/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}
